<!DOCTYPE html>
<html>
<head>
    <title>Salary Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Tech Salary Predictor</h1>
        <p class="subtitle">Estimate salary based on experience and company attributes</p>

        <form id="salaryForm">
            <select id="experience_level" required>
                <option value="">Experience Level</option>
                <option value="EN">Entry</option>
                <option value="MI">Mid</option>
                <option value="SE">Senior</option>
                <option value="EX">Executive</option>
            </select>

            <select id="employment_type" required>
                <option value="">Employment Type</option>
                <option value="FT">Full Time</option>
                <option value="PT">Part Time</option>
                <option value="CT">Contract</option>
                <option value="FL">Freelance</option>
            </select>

            <select id="company_size" required>
                <option value="">Company Size</option>
                <option value="S">Small</option>
                <option value="M">Medium</option>
                <option value="L">Large</option>
            </select>

            <input type="number" id="work_year" placeholder="Work Year (e.g. 2023)" required />
            <input type="number" id="remote_ratio" placeholder="Remote Ratio (0-100)" required />
            <input type="text" id="residence_grouped" placeholder="Residence (US, GB, IN, Other)" required />

            <button type="submit">Predict Salary</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
